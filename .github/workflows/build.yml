name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Syntax Check
        run: |
          node --check main.js
          node --check preload.js
          node --check src/game-bridge.js

  build:
    name: Build on ${{ matrix.os }}
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: macos-latest
            artifact: macos
          - os: ubuntu-latest
            artifact: linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build Electron App
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: hqxball-${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: ignore

      - name: Upload macOS Artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: hqxball-${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: ignore

      - name: Upload Linux Artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: hqxball-${{ matrix.artifact }}
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: find release-artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "HQXBALL ${{ github.ref_name }}"
          body: |
            ## HQXBALL ${{ github.ref_name }}

            High-performance desktop client for [hqxball.com](https://www.hqxball.com).

            ### Downloads
            | Platform | File |
            |---|---|
            | 🪟 Windows | `.exe` (installer) or `.exe` (portable) |
            | 🍎 macOS | `.dmg` |
            | 🐧 Linux | `.AppImage` or `.deb` |

            ### Installation
            - **Windows:** Run the `.exe` installer or use the portable version directly
            - **macOS:** Open the `.dmg` and drag HQXBALL to Applications
            - **Linux:** Make the `.AppImage` executable (`chmod +x`) and run it, or install the `.deb`
          files: release-artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
